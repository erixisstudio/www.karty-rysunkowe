<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Galeria Obrazów</title>
    <style>
        /* Stylizacja struktury wizualnej (CSS) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        /* Flexbox do płynnego i elastycznego układania kafelków */
        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            justify-content: center;
            padding: 20px;
        }

        /* Stylizacja samych obrazków z delikatnym efektem uniesienia */
        .galeria img { 
            width: 250px; 
            height: auto; 
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s ease-in-out;
        }

        /* Interakcja: delikatna aprecjacja skali po najechaniu kursorem */
        .galeria img:hover {
            transform: scale(1.05);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Moja Jednoplikowa Galeria</h1>
    
    <div id="galeria" class="galeria"></div>

    <script>
        /* Sekcja logiczna (JavaScript) */

        // Tablica asocjacyjna reprezentująca zasoby w folderze "imgs"
        // TUTAJ WPISZ NAZWY SWOICH PLIKÓW:
        const obrazy = ['foto1.jpg', 'foto2.png', 'piesek.jpg', 'kostka.webp'];

        // Pobranie referencji do węzła nadrzędnego w strukturze HTML
        const kontener = document.getElementById('galeria');

        // Iteracja po elementach tablicy i dynamiczna generacja tagów <img>
        obrazy.forEach(nazwaPliku => {
            const img = document.createElement('img');
            img.src = `imgs/${nazwaPliku}`; // Budowanie relatywnej ścieżki dostępowej
            img.alt = `Zdjęcie: ${nazwaPliku}`;
            
            // Wstrzyknięcie gotowego elementu do wnętrza kontenera
            kontener.appendChild(img);
        });
    </script>

</body>
</html>
